
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallel Computing Quiz</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;padding:20px}
.card{max-width:900px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.option{display:block;margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:8px;cursor:pointer}
.option:hover{background:#f0f7ff}
.correct{background:#d4edda!important;border-color:#28a745}
.wrong{background:#f8d7da!important;border-color:#dc3545}
button{padding:10px 20px;border:none;border-radius:8px;background:#28a745;color:white;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<h2>Parallel Computing Quiz</h2>
<p>اختار الإجابة، هيظهرلك فوراً إذا كانت صح أو غلط.</p>

<div id="quiz"></div>
<button onclick="nextQ()">السؤال التالي</button>
</div>

<script>
const questions=[
{
q:"How much did the performance of microprocessors increase per year from 1986 to 2003?",
options:["Less than 4%","10%","25%","More than 50%"],
answer:3
},
{
q:"Why did manufacturers move to multicore processors?",
options:[
"Decrease computer size",
"Faster monolithic processors became too difficult",
"Eliminate memory",
"Use less electricity"
],
answer:1
},
{
q:"Which API is primarily used for distributed memory MIMD systems?",
options:["Pthreads","OpenMP","CUDA","MPI"],
answer:3
},
{
q:"What is the process of dividing work equally among cores called?",
options:["Synchronization","Caching","Pipelining","Load balancing"],
answer:3
}
];

let current=0;

function render(){
const q=questions[current];
document.getElementById("quiz").innerHTML=`
<h3>${current+1}. ${q.q}</h3>
${q.options.map((o,i)=>`<div class="option" onclick="check(this,${i})">${o}</div>`).join("")}
`;
}

function check(el,index){
const q=questions[current];
document.querySelectorAll(".option").forEach(x=>x.style.pointerEvents="none");
if(index===q.answer){
el.classList.add("correct");
}else{
el.classList.add("wrong");
document.querySelectorAll(".option")[q.answer].classList.add("correct");
}
}

function nextQ(){
current=(current+1)%questions.length;
render();
}

render();
</script>
</body>
</html>
